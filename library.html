<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Music Library</title>

<link rel="stylesheet" href="css/library.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>

<h1><i class="fa-solid fa-headphones"></i> Music Library</h1>

<input
type="text"
id="searchSong"
placeholder="Search songs...">

</header>

<div class="song-grid" id="songGrid">

<div class="song-card">

<img src="images/song1.jpg">

<h3>Blinding Lights</h3>

<p>The Weeknd</p>

<div class="buttons">

<button class="play">
<i class="fa-solid fa-play"></i>
</button>

<button class="fav">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

<div class="song-card">

<img src="images/song2.jpg">

<h3>Shape Of You</h3>

<p>Ed Sheeran</p>

<div class="buttons">

<button class="play">
<i class="fa-solid fa-play"></i>
</button>

<button class="fav">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

<div class="song-card">

<img src="images/song3.jpg">

<h3>Believer</h3>

<p>Imagine Dragons</p>

<div class="buttons">

<button class="play">
<i class="fa-solid fa-play"></i>
</button>

<button class="fav">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

<div class="song-card">

<img src="images/song4.jpg">

<h3>Perfect</h3>

<p>Ed Sheeran</p>

<div class="buttons">

<button class="play">
<i class="fa-solid fa-play"></i>
</button>

<button class="fav">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

</div>

</div>

<script src="js/library.js"></script>

</body>
</html>
